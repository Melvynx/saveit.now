name: E2E Playwright Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/playwright.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"

# Cancel previous runs on the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Turborepo cache
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  test:
    name: Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # Common environment variables for all steps
    env:
      # Core
      BETTER_AUTH_SECRET: "test-secret-key-for-ci-testing-only-not-production"
      NODE_ENV: "production"
      # AWS S3 / Cloudflare R2
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
      AWS_ENDPOINT: ${{ secrets.AWS_ENDPOINT }}
      R2_URL: ${{ secrets.R2_URL }}
      # Cloudflare API
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Screenshot Worker
      SCREENSHOT_WORKER_URL: ${{ secrets.SCREENSHOT_WORKER_URL }}
      # Email
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_EMAIL_FROM: "Melvyn from SaveIt.now <help@re.saveit.now>"
      HELP_EMAIL: ${{ secrets.HELP_EMAIL }}
      # Stripe
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRO_MONTHLY_PRICE_ID: ${{ secrets.STRIPE_PRO_MONTHLY_PRICE_ID }}
      STRIPE_PRO_YEARLY_PRICE_ID: ${{ secrets.STRIPE_PRO_YEARLY_PRICE_ID }}
      STRIPE_COUPON_ID: ${{ secrets.STRIPE_COUPON_ID }}
      # AI Services
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      # Analytics
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
      # Convex
      VITE_CONVEX_URL: "https://tough-chameleon-916.convex.cloud"
      CONVEX_URL: "https://tough-chameleon-916.convex.cloud"
      VITE_CONVEX_SITE_URL: "https://tough-chameleon-916.convex.site"
      CONVEX_SITE_URL: "https://tough-chameleon-916.convex.site"
      # OAuth
      GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      # External APIs
      APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
      # Playwright specific
      PLAYWRIGHT_TEST_BASE_URL: "http://localhost:3000"
      HEADLESS: "true"
      CI: "true"
      PORT: 3000
      PLAYWRIGHT_CHROMIUM_CHANNEL: "chrome"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --prod=false

      - name: Build web application
        run: pnpm build
        working-directory: apps/web

      - name: Verify Chrome browser
        run: google-chrome --version
        working-directory: apps/web

      - name: Start application
        run: |
          # Start application and capture logs
          mkdir -p logs
          pnpm start > logs/server.log 2>&1 &
        working-directory: apps/web

      - name: Wait for application to be ready
        run: pnpm dlx wait-on@latest http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        run: pnpm test:e2e:ci
        working-directory: apps/web

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: apps/web/test-results/
          retention-days: 30

      - name: Upload server logs
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: debug-logs
          path: |
            logs/
            apps/web/logs/
          retention-days: 30
